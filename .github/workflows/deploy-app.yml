name: deploy-app

on:
  workflow_run:
    workflows: ["test-cookbooks"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Wait for required checks
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          wait_for_workflow() {
            local workflow_file="$1"
            local label="$2"

            echo "Waiting for ${label} on ${HEAD_SHA}"
            for attempt in $(seq 1 30); do
              run_json="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?head_sha=${HEAD_SHA}&branch=main&event=push&per_page=1")"
              status="$(jq -r '.workflow_runs[0].status // ""' <<< "$run_json")"
              conclusion="$(jq -r '.workflow_runs[0].conclusion // ""' <<< "$run_json")"

              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "${label} succeeded."
                  return 0
                fi
                echo "${label} completed with conclusion: ${conclusion}"
                return 1
              fi

              echo "${label} is ${status:-not started yet}; retry ${attempt}/30."
              sleep 20
            done

            echo "${label} did not complete in time."
            return 1
          }

          wait_for_workflow "validate-recipes.yml" "validate-recipes"
          wait_for_workflow "build-app.yml" "build-app"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0  # full history needed for Clever Cloud git push

      - name: Install Clever Cloud CLI
        run: npm install -g clever-tools

      - name: Deploy to Clever Cloud
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
          CLEVER_APP_ID: ${{ secrets.CLEVER_APP_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GITHUB_REPO: ${{ vars.NEXT_PUBLIC_GITHUB_REPO }}
        run: |
          clever login --token "$CLEVER_TOKEN" --secret "$CLEVER_SECRET"
          clever link "$CLEVER_APP_ID"
          clever env set NODE_ENV production
          clever env set CC_NODE_BUILD_TOOL bun
          clever env set CC_CUSTOM_BUILD_TOOL "bun"
          clever env set CC_NODE_DEV_DEPENDENCIES "install"
          clever env set CC_POST_BUILD_HOOK "bun run build"
          clever env set CC_RUN_COMMAND "cd app && bun start"
          clever env set PORT 8080
          clever env set NEXT_PUBLIC_SITE_URL "$NEXT_PUBLIC_SITE_URL"
          clever env set NEXT_PUBLIC_GITHUB_REPO "$NEXT_PUBLIC_GITHUB_REPO"
          clever deploy --force
