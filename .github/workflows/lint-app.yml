name: lint-app

on:
  workflow_run:
    workflows: ["test-cookbooks"]
    types: [completed]
    branches: [main]
  pull_request:

concurrency:
  group: lint-app-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: ${{ github.event_name == 'pull_request' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow_run commit
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout pull request
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Validate every recipe.json
        run: bun run validate

      - name: Confirm README.md is in sync
        run: bun run build:readme --check

      - name: Build recipe manifest
        run: bun run build:recipes

      - name: Lint Next.js app
        working-directory: app
        run: bun run lint

      - name: Typecheck Next.js app
        working-directory: app
        run: bun run typecheck
