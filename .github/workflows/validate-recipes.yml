name: validate-recipes

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-recipes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Validate every recipe.json
        run: bun run validate

      - name: Confirm README.md is in sync
        run: bun run build:readme --check
